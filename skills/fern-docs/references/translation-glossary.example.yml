# Translation glossary (reusable starter)
#
# Drop this into a customer repo at `fern/translations/glossary.yml` and edit it
# to fit. It pins how specific terms render in every locale so a name never comes
# out three different ways across a docs site. Pass it into every page's
# translation. See references/translations.md > "Per-repo glossary".
#
# Each entry is a source `term:` plus EITHER:
#   keep: true            -> never translate; identical in every locale
#   translations: {...}   -> a fixed rendering per locale code
#
# This starter is seeded with the Nexi Checkout demo's brand/proper nouns and is
# PROVISIONAL — the final set and any per-locale renderings should be confirmed
# against the translation quality benchmark and with the customer.

terms:
  # --- Product & company names: keep verbatim everywhere ---
  - term: "Nexi"
    keep: true
  - term: "Nexi Group"
    keep: true
  - term: "Nexi Checkout"
    keep: true
  - term: "Nets"
    keep: true

  # --- Payment methods, networks & wallets: brand names, keep verbatim ---
  - term: "VISA"
    keep: true
  - term: "Mastercard"
    keep: true
  - term: "Maestro"
    keep: true
  - term: "Dankort"
    keep: true
  - term: "American Express"
    keep: true
  - term: "Klarna"
    keep: true
  - term: "MobilePay"
    keep: true
  - term: "Vipps"
    keep: true
  - term: "Swish"
    keep: true
  - term: "Trustly"
    keep: true
  - term: "PayPal"
    keep: true
  - term: "Apple Pay"
    keep: true
  - term: "Google Pay"
    keep: true
  - term: "Riverty"
    keep: true
  - term: "Ratepay"
    keep: true
  - term: "SEPA"
    keep: true

  # --- Webshop platforms & SDKs: product names, keep verbatim ---
  - term: "WooCommerce"
    keep: true
  - term: "Shopify"
    keep: true
  - term: "PrestaShop"
    keep: true
  - term: "Magento"
    keep: true
  - term: "Shopware"
    keep: true
  - term: "OXID"
    keep: true
  - term: "Paylink"
    keep: true

  # --- House terminology: fixed per-locale rendering for consistency ---
  # Example of a translated (not kept) term. Extend per repo and per locale;
  # confirm renderings with the customer rather than guessing.
  - term: "merchant"
    translations:
      it: "esercente"
      de: "Händler"
      fr: "commerçant"
